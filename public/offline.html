<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오프라인</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #ffffff;
        color: #111827;
        margin: 0;
        padding: 24px;
      }
      .box {
        max-width: 520px;
        margin: 80px auto 0;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        background: #f9fafb;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #4b5563;
        line-height: 1.5;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>오프라인 상태</h1>
      <p>네트워크 연결이 없습니다. 잠시 후 다시 시도해 주세요.</p>
    </div>
  </body>
</html>
